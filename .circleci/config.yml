version: 2.1

jobs:
  test-sharded:
    docker:
      # Includes Java + Playwright browsers pre-installed for faster startup.
      - image: mcr.microsoft.com/playwright/java:v1.40.0-jammy
    parallelism: 4
    environment:
      MAVEN_OPTS: -Xmx2048m
    steps:
      - checkout

      - restore_cache:
          keys:
            - m2-v1-{{ checksum "pom.xml" }}
            - m2-v1-

      - run:
          name: Resolve dependencies
          command: mvn -B -q -DskipTests dependency:go-offline

      - save_cache:
          key: m2-v1-{{ checksum "pom.xml" }}
          paths:
            - ~/.m2

      - run:
          name: Select shard tag expression
          command: |
            case "$CIRCLE_NODE_INDEX" in
              0) TAG_EXPR='@test1 or @test2 or @test3 or @test4 or @test5' ;;
              1) TAG_EXPR='@test6 or @test7 or @test8 or @test9 or @test10' ;;
              2) TAG_EXPR='@test11 or @test12 or @test13 or @test14 or @test15' ;;
              3) TAG_EXPR='@test16 or @test17 or @test18 or @test19 or @test20 or @test21' ;;
              *) TAG_EXPR='@smoke' ;;
            esac
            echo "export TAG_EXPR=\"$TAG_EXPR\"" >> "$BASH_ENV"
            echo "Node $CIRCLE_NODE_INDEX running tags: $TAG_EXPR"

      - run:
          name: Run smoke tests (headless)
          command: |
            source "$BASH_ENV"
            mvn -B \
              -Dtest.browser=chromium \
              -Dtest.headless=true \
              -Dcucumber.filter.tags="$TAG_EXPR" \
              test

      - store_test_results:
          path: target/surefire-reports

      - store_artifacts:
          path: target
          destination: target

workflows:
  ci:
    jobs:
      - test-sharded
